<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios — Congresso do Diaconato</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family:'Inter',sans-serif; }
    @media print { .no-print { display:none !important; } }

    /* Estilos do PDF */
    #area-pdf {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #1e293b;
    }
    #area-pdf h1 { font-size:14px; font-weight:700; margin:0 0 2px; }
    #area-pdf .sub { font-size:10px; color:#64748b; margin-bottom:12px; }
    #area-pdf table { width:100%; border-collapse:collapse; margin-top:8px; }
    #area-pdf th { background:#4338ca; color:#fff; padding:6px 8px; text-align:left; font-size:10px; }
    #area-pdf td { padding:5px 8px; border-bottom:1px solid #e2e8f0; font-size:10px; }
    #area-pdf tr:nth-child(even) td { background:#f8fafc; }
    #area-pdf tr.conferido td { background:#dcfce7 !important; color:#94a3b8; text-decoration:line-through; }
    #area-pdf .totais { margin-top:12px; padding:8px; background:#f1f5f9; border-radius:4px; font-size:10px; }
    #area-pdf .status-q { color:#16a34a; font-weight:600; }
    #area-pdf .status-p { color:#d97706; font-weight:600; }
    #area-pdf .status-n { color:#dc2626; font-weight:600; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <header class="bg-indigo-700 text-white shadow-md no-print">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center gap-3">
      <a href="index.html" class="text-indigo-200 hover:text-white text-sm mr-1">← Início</a>
      <span class="text-indigo-400">|</span>
      <span class="text-lg">📄</span>
      <h1 class="font-bold text-lg">Relatórios</h1>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 no-print">

    <!-- Seletor de relatório -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
      <h2 class="font-semibold text-slate-800 mb-4">Selecione o Relatório</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <button onclick="setRel(1)" id="btn-rel-1"
          class="p-4 rounded-xl border-2 text-left transition-all border-indigo-500 bg-indigo-50">
          <div class="text-xl mb-1">🚌</div>
          <div class="font-semibold text-sm text-slate-800">Lista para Ônibus</div>
          <div class="text-xs text-slate-500 mt-1">Nome, documento, nascimento</div>
        </button>
        <button onclick="setRel(2)" id="btn-rel-2"
          class="p-4 rounded-xl border-2 text-left transition-all border-slate-200 hover:border-indigo-300">
          <div class="text-xl mb-1">📋</div>
          <div class="font-semibold text-sm text-slate-800">Lista Completa</div>
          <div class="text-xs text-slate-500 mt-1">Nome, CPF, RG, nascimento, e-mail, igreja</div>
        </button>
        <button onclick="setRel(3)" id="btn-rel-3"
          class="p-4 rounded-xl border-2 text-left transition-all border-slate-200 hover:border-indigo-300">
          <div class="text-xl mb-1">💰</div>
          <div class="font-semibold text-sm text-slate-800">Situação Financeira</div>
          <div class="text-xs text-slate-500 mt-1">Pagamentos por igreja</div>
        </button>
        <button onclick="setRel(4)" id="btn-rel-4"
          class="p-4 rounded-xl border-2 text-left transition-all border-slate-200 hover:border-indigo-300">
          <div class="text-xl mb-1">💸</div>
          <div class="font-semibold text-sm text-slate-800">Despesas / Caixa</div>
          <div class="text-xs text-slate-500 mt-1">Saídas e saldo do caixa</div>
        </button>
      </div>
    </div>

    <!-- Filtros -->
    <div id="card-filtros" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
      <h2 class="font-semibold text-slate-800 mb-4">Filtros</h2>
      <div class="flex flex-col sm:flex-row gap-4">
        <div class="flex-1">
          <label class="text-sm font-medium text-slate-700 block mb-1">Igreja</label>
          <select id="filtro-igreja"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
            <option value="">Todas as igrejas</option>
          </select>
        </div>
        <div class="flex-1" id="filtro-status-wrap">
          <label class="text-sm font-medium text-slate-700 block mb-1">Situação de Pagamento</label>
          <select id="filtro-status"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
            <option value="">Todas</option>
            <option value="quitado">Quitado</option>
            <option value="parcial">Parcial</option>
            <option value="pendente">Pendente</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Gestão de Despesas (só relatório 4) -->
    <div id="painel-despesas" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
      <h2 class="font-semibold text-slate-800 mb-4" id="desp-form-titulo">Registrar Saída / Despesa</h2>
      <div class="grid grid-cols-1 sm:grid-cols-4 gap-3 items-end">
        <div>
          <label class="text-sm font-medium text-slate-700 block mb-1">Valor (R$) *</label>
          <input id="desp-valor" type="number" min="0" step="0.01" placeholder="0,00"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 block mb-1">Data *</label>
          <input id="desp-data" type="date"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div class="sm:col-span-2">
          <label class="text-sm font-medium text-slate-700 block mb-1">Descrição *</label>
          <input id="desp-descricao" type="text" placeholder="Ex: Aluguel de som"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
      </div>
      <div class="flex items-center justify-between mt-3 flex-wrap gap-3">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input id="desp-nf" type="checkbox" class="accent-indigo-600 w-4 h-4" />
          <span class="text-sm text-slate-700">Possui nota fiscal</span>
        </label>
        <div class="flex gap-2">
          <button id="desp-cancel" onclick="cancelarEdicaoDespesa()"
            class="hidden border border-slate-200 text-slate-600 font-semibold px-4 py-2.5 rounded-xl hover:bg-slate-50 transition-colors text-sm">Cancelar edição</button>
          <button id="desp-salvar" onclick="salvarDespesa()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors text-sm">+ Adicionar despesa</button>
        </div>
      </div>
      <input type="hidden" id="desp-id" />
      <div id="lista-despesas" class="mt-5 border-t border-slate-100 pt-4"></div>
    </div>

    <!-- Botão gerar -->
    <div class="flex gap-3 justify-end mb-8">
      <button onclick="gerarPDF()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl transition-colors text-sm">
        ⬇ Baixar PDF
      </button>
      <button onclick="imprimirDireto()"
        class="border border-slate-200 text-slate-700 hover:bg-slate-50 font-semibold px-6 py-2.5 rounded-xl transition-colors text-sm">
        🖨 Imprimir
      </button>
    </div>

    <!-- Pré-visualização -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <h2 class="font-semibold text-slate-800 mb-4 text-sm uppercase tracking-wide text-slate-500">Pré-visualização</h2>
      <div id="area-pdf" class="border border-slate-200 rounded-xl p-6 bg-white min-h-[400px]">
        <p class="text-slate-400 text-sm text-center py-10">Selecione um relatório para visualizar.</p>
      </div>
    </div>
  </main>

  <!-- Modal de senha (editar / excluir despesa) -->
  <div id="modal-senha" class="hidden fixed inset-0 bg-black/40 z-50 items-center justify-center p-4 no-print">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
      <h2 class="font-bold text-slate-800 text-lg mb-1">Confirmação necessária</h2>
      <p class="text-sm text-slate-500 mb-5" id="senha-subtitulo"></p>
      <div>
        <label class="text-sm font-medium text-slate-700 block mb-1">Senha *</label>
        <input id="field-senha" type="password" placeholder="Digite a senha"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          onkeydown="if(event.key==='Enter') confirmarSenha()" />
        <p id="erro-senha" class="text-xs text-rose-500 mt-1 hidden">Senha incorreta.</p>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="fecharModalSenha()" class="flex-1 border border-slate-200 text-slate-600 font-semibold py-2.5 rounded-xl hover:bg-slate-50 transition-colors text-sm">Cancelar</button>
        <button onclick="confirmarSenha()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors text-sm">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiGet, apiPost, formatBRL, showToast } from './js/config.js';

    const VALOR_INSCRICAO = 150;
    const SENHA = 'admin';

    let inscritos  = [];
    let pagamentos = [];
    let igrejas    = [];
    let despesas   = [];
    let relAtual   = 1;
    let senhaCallback = null;

    const agora = () => new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

    // dd/mm/aaaa a partir de string variada
    function fmtData(v) {
      if (!v) return '—';
      if (/^\d{2}\/\d{2}\/\d{4}/.test(v)) return v.slice(0, 10);
      const d = new Date(v);
      if (isNaN(d)) return v;
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    // aaaa-mm-dd (para <input type=date>)
    function toInputDate(v) {
      if (!v) return '';
      if (/^\d{2}\/\d{2}\/\d{4}/.test(v)) { const [d,m,y] = v.slice(0,10).split('/'); return `${y}-${m}-${d}`; }
      const dt = new Date(v);
      if (isNaN(dt)) return '';
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    }

    async function init() {
      [inscritos, pagamentos, igrejas, despesas] = await Promise.all([
        apiGet('getInscricoes'),
        apiGet('getPagamentos'),
        apiGet('getIgrejas'),
        apiGet('getDespesas').catch(() => [])  // tolera backend ainda não reimplantado
      ]);
      const sel = document.getElementById('filtro-igreja');
      sel.innerHTML = '<option value="">Todas as igrejas</option>' +
        igrejas.map(ig => `<option value="${ig.id}">${ig.nome}</option>`).join('');
      renderizarRelatorio();
    }

    window.setRel = function(n) {
      relAtual = n;
      [1,2,3,4].forEach(i => {
        const btn = document.getElementById('btn-rel-' + i);
        if (i === n) {
          btn.classList.add('border-indigo-500','bg-indigo-50');
          btn.classList.remove('border-slate-200','hover:border-indigo-300');
        } else {
          btn.classList.remove('border-indigo-500','bg-indigo-50');
          btn.classList.add('border-slate-200','hover:border-indigo-300');
        }
      });
      // Oculta filtro de status para rel 1
      document.getElementById('filtro-status-wrap').style.display = n === 1 ? 'none' : '';
      // Relatório 4 (despesas): esconde filtros por igreja/status e mostra o painel de gestão
      document.getElementById('card-filtros').classList.toggle('hidden', n === 4);
      document.getElementById('painel-despesas').classList.toggle('hidden', n !== 4);
      renderizarRelatorio();
    };

    document.getElementById('filtro-igreja').addEventListener('change', renderizarRelatorio);
    document.getElementById('filtro-status').addEventListener('change', renderizarRelatorio);

    function getSituacaoIgreja(ig, pagsList) {
      const vagas      = Number(ig.qtdVagas) || 0;
      const devido     = vagas * 150;
      const confirmado = pagsList.filter(p => p.formaPagamento === 'Dinheiro' || p.conferido === 'sim').reduce((s,p) => s + Number(p.valor||0), 0);
      const provisorio = pagsList.filter(p => p.formaPagamento === 'Pix' && p.conferido !== 'sim').reduce((s,p) => s + Number(p.valor||0), 0);
      const pendente   = Math.max(0, devido - confirmado);
      const status     = pendente === 0 ? 'quitado' : (confirmado > 0 || provisorio > 0 ? 'parcial' : 'pendente');
      return { vagas, devido, confirmado, provisorio, pendente, status };
    }

    function situacaoPorIgrejaId(igrejaId) {
      const ig = igrejas.find(i => i.id === igrejaId);
      if (!ig) return { status: 'pendente' };
      return getSituacaoIgreja(ig, pagamentos.filter(p => p.igrejaId === igrejaId));
    }

    function renderizarRelatorio() {
      const igrejaFiltro  = document.getElementById('filtro-igreja').value;
      const statusFiltro  = document.getElementById('filtro-status').value;
      const area          = document.getElementById('area-pdf');
      const dataEmissao   = agora();

      const cabecalho = `
        <h1>Congresso Estadual do Diaconato — IEQ Região 655</h1>
        <div class="sub">Emitido em: ${dataEmissao}</div>
      `;

      if (relAtual === 1) {
        // Lista para ônibus
        let lista = igrejaFiltro ? inscritos.filter(i => i.igrejaId === igrejaFiltro) : inscritos;
        lista = lista.sort((a,b) => a.nomeCompleto.localeCompare(b.nomeCompleto));

        area.innerHTML = cabecalho + `
          <h2 style="font-size:12px;font-weight:600;margin-bottom:4px;">Lista para Empresa de Ônibus${igrejaFiltro ? ' — ' + lista[0]?.igrejaNome : ''}</h2>
          <p style="font-size:10px;color:#64748b;margin-bottom:8px;">${lista.length} participante(s)</p>
          <table>
            <thead><tr>
              <th>#</th><th>Nome Completo</th><th>CPF</th><th>RG</th><th>Data de Nascimento</th>
            </tr></thead>
            <tbody>
              ${lista.map((ins, i) => `
                <tr>
                  <td>${i+1}</td>
                  <td>${ins.nomeCompleto}</td>
                  <td>${ins.cpf || '—'}</td>
                  <td>${ins.rg  || '—'}</td>
                  <td>${fmtData(ins.dataNascimento)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="totais">Total: ${lista.length} participante(s)</div>
        `;

      } else if (relAtual === 2) {
        // Lista completa
        let lista = igrejaFiltro ? inscritos.filter(i => i.igrejaId === igrejaFiltro) : inscritos;

        // Filtro por status de pagamento da igreja
        if (statusFiltro) {
          const igrejasMap = {};
          lista.forEach(ins => {
            if (!igrejasMap[ins.igrejaId]) igrejasMap[ins.igrejaId] = [];
            igrejasMap[ins.igrejaId].push(ins);
          });
          lista = Object.values(igrejasMap)
            .filter(grupo => situacaoPorIgrejaId(grupo[0].igrejaId).status === statusFiltro)
            .flat();
        }

        lista = lista.sort((a,b) => a.igrejaNome.localeCompare(b.igrejaNome) || a.nomeCompleto.localeCompare(b.nomeCompleto));

        area.innerHTML = cabecalho + `
          <h2 style="font-size:12px;font-weight:600;margin-bottom:4px;">Lista Completa de Inscritos</h2>
          <p style="font-size:10px;color:#64748b;margin-bottom:8px;">${lista.length} inscrito(s)</p>
          <table>
            <thead><tr>
              <th style="width:28px;text-align:center;">✓</th><th>#</th><th>Nome Completo</th><th>CPF</th><th>RG</th><th>Data de Nascimento</th><th>E-mail</th><th>Igreja</th>
            </tr></thead>
            <tbody>
              ${lista.map((ins, i) => `
                <tr>
                  <td style="text-align:center;"><input type="checkbox" onclick="this.closest('tr').classList.toggle('conferido', this.checked)"></td>
                  <td>${i+1}</td>
                  <td>${ins.nomeCompleto}</td>
                  <td>${ins.cpf || '—'}</td>
                  <td>${ins.rg || '—'}</td>
                  <td>${fmtData(ins.dataNascimento)}</td>
                  <td>${ins.email || '—'}</td>
                  <td>${ins.igrejaNome || '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="totais">Total: ${lista.length} inscrito(s)</div>
        `;

      } else if (relAtual === 3) {
        // Situação financeira — uma linha por igreja com vagas definidas
        let lista = igrejas
          .filter(ig => Number(ig.qtdVagas) > 0)
          .map(ig => ({
            igrejaId:   ig.id,
            igrejaNome: ig.nome,
            qtd:        inscritos.filter(i => i.igrejaId === ig.id).length,
            ...getSituacaoIgreja(ig, pagamentos.filter(p => p.igrejaId === ig.id))
          }));

        if (statusFiltro) lista = lista.filter(ig => ig.status === statusFiltro);
        if (igrejaFiltro) lista = lista.filter(ig => ig.igrejaId === igrejaFiltro);

        lista = lista.sort((a,b) => a.igrejaNome.localeCompare(b.igrejaNome));

        const totVagas      = lista.reduce((s,ig) => s + ig.vagas, 0);
        const totDevido     = lista.reduce((s,ig) => s + ig.devido, 0);
        const totConfirmado = lista.reduce((s,ig) => s + ig.confirmado, 0);
        const totProvisorio = lista.reduce((s,ig) => s + ig.provisorio, 0);
        const totPendente   = lista.reduce((s,ig) => s + ig.pendente, 0);

        const statusLabel = s => s === 'quitado' ? '<span class="status-q">Quitado</span>' : s === 'parcial' ? '<span class="status-p">Parcial</span>' : '<span class="status-n">Pendente</span>';

        area.innerHTML = cabecalho + `
          <h2 style="font-size:12px;font-weight:600;margin-bottom:4px;">Situação Financeira por Igreja</h2>
          <p style="font-size:10px;color:#64748b;margin-bottom:8px;">${lista.length} igreja(s)</p>
          <table>
            <thead><tr>
              <th>Igreja</th><th>Vagas</th><th>Inscritos</th><th>Devido</th><th>Confirmado</th><th>Provisório</th><th>Pendente</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${lista.map(ig => `
                <tr>
                  <td>${ig.igrejaNome}</td>
                  <td style="text-align:center">${ig.vagas}</td>
                  <td style="text-align:center">${ig.qtd}</td>
                  <td>${formatBRL(ig.devido)}</td>
                  <td>${formatBRL(ig.confirmado)}</td>
                  <td>${formatBRL(ig.provisorio)}</td>
                  <td>${formatBRL(ig.pendente)}</td>
                  <td>${statusLabel(ig.status)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="totais">
            <strong>Totais:</strong>
            Vagas: ${totVagas} &nbsp;|&nbsp;
            Devido: ${formatBRL(totDevido)} &nbsp;|&nbsp;
            Confirmado (caixa): ${formatBRL(totConfirmado)} &nbsp;|&nbsp;
            Provisório: ${formatBRL(totProvisorio)} &nbsp;|&nbsp;
            Pendente: ${formatBRL(totPendente)}
          </div>
        `;

      } else if (relAtual === 4) {
        // Despesas / Caixa
        const listaDesp = [...despesas].sort((a,b) =>
          (toInputDate(a.data) || '').localeCompare(toInputDate(b.data) || ''));

        const totSaidas = despesas.reduce((s,d) => s + Number(d.valor || 0), 0);
        const entradasCaixa = pagamentos
          .filter(p => p.formaPagamento === 'Dinheiro' || p.conferido === 'sim')
          .reduce((s,p) => s + Number(p.valor || 0), 0);
        const provisorio = pagamentos
          .filter(p => p.formaPagamento === 'Pix' && p.conferido !== 'sim')
          .reduce((s,p) => s + Number(p.valor || 0), 0);
        const saldo = entradasCaixa - totSaidas;

        area.innerHTML = cabecalho + `
          <h2 style="font-size:12px;font-weight:600;margin-bottom:4px;">Despesas / Saídas do Caixa</h2>
          <p style="font-size:10px;color:#64748b;margin-bottom:8px;">${listaDesp.length} despesa(s)</p>
          <table>
            <thead><tr>
              <th>#</th><th>Data</th><th>Descrição</th>
              <th style="text-align:center">Nota Fiscal</th><th style="text-align:right">Valor</th>
            </tr></thead>
            <tbody>
              ${listaDesp.map((d,i) => `
                <tr>
                  <td>${i+1}</td>
                  <td>${fmtData(d.data)}</td>
                  <td>${d.descricao || '—'}</td>
                  <td style="text-align:center">${d.notaFiscal === 'sim' ? '✔ Sim' : '—'}</td>
                  <td style="text-align:right">${formatBRL(d.valor)}</td>
                </tr>
              `).join('') || '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:12px">Nenhuma despesa registrada.</td></tr>'}
            </tbody>
          </table>
          <div class="totais">
            <strong>Composição atual do caixa:</strong><br>
            Entradas (confirmadas): ${formatBRL(entradasCaixa)} &nbsp;−&nbsp;
            Saídas: ${formatBRL(totSaidas)} &nbsp;=&nbsp;
            <strong style="color:${saldo >= 0 ? '#16a34a' : '#dc2626'}">Saldo em caixa: ${formatBRL(saldo)}</strong>
            <div style="margin-top:4px;color:#64748b;font-size:9px;">Pix provisório (ainda não confirmado, fora do caixa): ${formatBRL(provisorio)}</div>
          </div>
        `;

        renderListaDespesas();
      }
    }

    // ── Gestão de Despesas (painel no-print do relatório 4) ──────
    function renderListaDespesas() {
      const cont = document.getElementById('lista-despesas');
      if (!cont) return;
      if (!despesas.length) {
        cont.innerHTML = '<p class="text-sm text-slate-400 text-center py-3">Nenhuma despesa registrada ainda.</p>';
        return;
      }
      const lista = [...despesas].sort((a,b) =>
        (toInputDate(a.data) || '').localeCompare(toInputDate(b.data) || ''));
      cont.innerHTML = lista.map(d => `
        <div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0 flex-wrap">
          <span class="text-sm font-semibold text-rose-600 whitespace-nowrap">${formatBRL(d.valor)}</span>
          <span class="text-xs text-slate-400 whitespace-nowrap">${fmtData(d.data)}</span>
          <span class="text-sm text-slate-700 flex-1 min-w-0">${d.descricao || '—'}</span>
          ${d.notaFiscal === 'sim'
            ? '<span class="text-xs px-2 py-0.5 rounded-full font-semibold bg-emerald-100 text-emerald-700">NF ✔</span>'
            : '<span class="text-xs px-2 py-0.5 rounded-full font-semibold bg-slate-100 text-slate-500">sem NF</span>'}
          <button onclick="editarDespesa('${d.id}')" class="text-indigo-500 hover:text-indigo-700 text-xs font-medium">Editar</button>
          <button onclick="excluirDespesa('${d.id}')" class="text-rose-400 hover:text-rose-600 text-xs font-medium">Excluir</button>
        </div>
      `).join('');
    }

    async function recarregarDespesas() {
      despesas = await apiGet('getDespesas');
      renderizarRelatorio();
    }

    window.salvarDespesa = async function() {
      const id         = document.getElementById('desp-id').value;
      const valor      = parseFloat(document.getElementById('desp-valor').value);
      const dataRaw    = document.getElementById('desp-data').value;
      const descricao  = document.getElementById('desp-descricao').value.trim();
      const notaFiscal = document.getElementById('desp-nf').checked ? 'sim' : 'nao';

      if (!valor || valor <= 0) { showToast('Informe um valor válido.', 'error'); return; }
      if (!dataRaw)             { showToast('Informe a data.', 'error'); return; }
      if (!descricao)           { showToast('Informe a descrição.', 'error'); return; }

      const dataFmt = dataRaw.split('-').reverse().join('/'); // dd/mm/aaaa
      try {
        if (id) {
          await apiPost('editDespesa', { data: { id, valor, data: dataFmt, descricao, notaFiscal } });
          showToast('Despesa atualizada!');
        } else {
          await apiPost('addDespesa', { data: { valor, data: dataFmt, descricao, notaFiscal } });
          showToast('Despesa registrada!');
        }
        window.cancelarEdicaoDespesa();
        await recarregarDespesas();
      } catch(e) { showToast(e.message, 'error'); }
    };

    window.cancelarEdicaoDespesa = function() {
      document.getElementById('desp-id').value        = '';
      document.getElementById('desp-valor').value     = '';
      document.getElementById('desp-data').value      = '';
      document.getElementById('desp-descricao').value = '';
      document.getElementById('desp-nf').checked      = false;
      document.getElementById('desp-form-titulo').textContent = 'Registrar Saída / Despesa';
      document.getElementById('desp-salvar').textContent      = '+ Adicionar despesa';
      document.getElementById('desp-cancel').classList.add('hidden');
    };

    window.editarDespesa = function(id) {
      const d = despesas.find(x => x.id === id);
      if (!d) return;
      abrirSenha(`Editar despesa · ${d.descricao || ''} · ${formatBRL(d.valor)}`, () => {
        document.getElementById('desp-id').value        = d.id;
        document.getElementById('desp-valor').value     = d.valor;
        document.getElementById('desp-data').value      = toInputDate(d.data);
        document.getElementById('desp-descricao').value = d.descricao || '';
        document.getElementById('desp-nf').checked      = d.notaFiscal === 'sim';
        document.getElementById('desp-form-titulo').textContent = 'Editar Despesa';
        document.getElementById('desp-salvar').textContent      = 'Salvar alterações';
        document.getElementById('desp-cancel').classList.remove('hidden');
        document.getElementById('desp-valor').focus();
      });
    };

    window.excluirDespesa = function(id) {
      const d = despesas.find(x => x.id === id);
      if (!d) return;
      abrirSenha(`Excluir despesa · ${d.descricao || ''} · ${formatBRL(d.valor)}`, async () => {
        try {
          await apiPost('deleteDespesa', { id });
          showToast('Despesa removida.', 'info');
          await recarregarDespesas();
        } catch(e) { showToast(e.message, 'error'); }
      });
    };

    // ── Modal de senha ───────────────────────────────────────────
    function abrirSenha(subtitulo, onConfirm) {
      senhaCallback = onConfirm;
      document.getElementById('senha-subtitulo').textContent = subtitulo;
      document.getElementById('field-senha').value = '';
      document.getElementById('erro-senha').classList.add('hidden');
      document.getElementById('modal-senha').classList.remove('hidden');
      document.getElementById('modal-senha').classList.add('flex');
      setTimeout(() => document.getElementById('field-senha').focus(), 100);
    }
    window.fecharModalSenha = function() {
      senhaCallback = null;
      document.getElementById('modal-senha').classList.add('hidden');
      document.getElementById('modal-senha').classList.remove('flex');
    };
    window.confirmarSenha = async function() {
      const senha = document.getElementById('field-senha').value;
      if (senha !== SENHA) {
        document.getElementById('erro-senha').classList.remove('hidden');
        document.getElementById('field-senha').value = '';
        document.getElementById('field-senha').focus();
        return;
      }
      const fn = senhaCallback;
      senhaCallback = null;
      window.fecharModalSenha();
      if (fn) await fn();
    };

    const nomesRel = ['', 'lista-onibus', 'lista-completa', 'financeiro', 'despesas-caixa'];

    window.gerarPDF = function() {
      const el  = document.getElementById('area-pdf');
      const opt = {
        margin:     [10, 10, 10, 10],
        filename:   `congresso-diaconato-${nomesRel[relAtual]}-${new Date().toISOString().slice(0,10)}.pdf`,
        image:      { type:'jpeg', quality:0.98 },
        html2canvas:{ scale:2 },
        jsPDF:      { unit:'mm', format:'a4', orientation:'portrait' }
      };
      html2pdf().set(opt).from(el).save();
    };

    window.imprimirDireto = function() {
      const conteudo = document.getElementById('area-pdf').innerHTML;
      const w = window.open('', '_blank');
      w.document.write(`
        <html><head>
        <style>
          body { font-family:Arial,sans-serif; font-size:11px; color:#1e293b; margin:20px; }
          h1 { font-size:14px; font-weight:700; margin:0 0 2px; }
          .sub { font-size:10px; color:#64748b; margin-bottom:12px; }
          table { width:100%; border-collapse:collapse; margin-top:8px; }
          th { background:#4338ca; color:#fff; padding:6px 8px; text-align:left; font-size:10px; }
          td { padding:5px 8px; border-bottom:1px solid #e2e8f0; font-size:10px; }
          tr:nth-child(even) td { background:#f8fafc; }
          .totais { margin-top:12px; padding:8px; background:#f1f5f9; font-size:10px; }
          .status-q { color:#16a34a; font-weight:600; }
          .status-p { color:#d97706; font-weight:600; }
          .status-n { color:#dc2626; font-weight:600; }
        </style>
        </head><body>${conteudo}</body></html>
      `);
      w.document.close();
      w.print();
    };

    init();
  </script>
</body>
</html>
